<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Attendance Pro - Master</title>

<style>
    
    
 
#studentList,
#historyList{
flex:1;
overflow-y:auto;
padding:10px;
min-height:0;
}

    
    
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}
body{
height:100vh;
background:linear-gradient(-45deg,#0f0c29,#302b63,#24243e,#00f2fe);
background-size:400% 400%;
animation:bg 12s ease infinite;
display:flex;justify-content:center;align-items:center;color:white}
@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}



.glass{
position:relative;
width:95%;
max-width:1000px;
height:95vh;
background:rgba(255,255,255,0.05);
border-radius:25px;
backdrop-filter:blur(20px);
box-shadow:0 0 40px rgba(0,255,255,0.4);
display:flex;
flex-direction:column;
overflow:hidden;   /* IMPORTANT */
}




input,select,button{
padding:10px;border-radius:20px;border:none;font-weight:bold}
input,select{
background:rgba(255,255,255,0.1);color:white}
button{background:#00f2fe;cursor:pointer;margin:3px}
button:hover{transform:scale(1.05)}
#loginPage{
display:flex;flex-direction:column;justify-content:center;
align-items:center;height:100%;gap:10px}
.login-buttons{display:flex;gap:10px;width:300px}
#app{display:none;flex-direction:column;height:100%}
.header{
padding:15px;background:rgba(0,0,0,0.3);
text-align:center;font-size:18px;position:sticky;top:0}
.controls{
padding:10px;display:flex;flex-wrap:wrap;gap:10px;justify-content:center}






.page{
display:none;
flex-direction:column;
flex:1;
min-height:0;   /* IMPORTANT for scroll fix */
}

.page.active{
display:flex;
}






.student{
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.08);
margin:8px 0;
padding:12px;
border-radius:15px;
gap:10px;
}

.student span{
flex:1;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}








.present{background:#00ff88;color:black}
.absent{background:#ff4b5c;color:white}
.stats{text-align:center;padding:5px}
.credit{text-align:center;font-size:13px;padding:5px;opacity:0.8}
.credit span{color:#00f2fe;text-shadow:0 0 10px #00f2fe}











/* ========================= */
/* ULTRA NEON LOGIN STYLE 😎 */
/* ========================= */

#loginPage{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100%;
gap:18px;
padding:40px;
background:rgba(0,0,0,0.35);
border-radius:25px;
backdrop-filter:blur(25px);
box-shadow:0 0 60px rgba(0,255,255,0.6);
animation:loginFade 0.8s ease;
}

#loginPage h2{
font-size:24px;
letter-spacing:1px;
color:#00f2fe;
text-shadow:0 0 20px #00f2fe;
animation:glowText 2s infinite alternate;
}

#loginPage input{
width:260px;
padding:14px 20px;
border-radius:30px;
border:2px solid transparent;
background:rgba(255,255,255,0.08);
color:white;
outline:none;
transition:0.3s;
font-size:14px;
}

#loginPage input:focus{
border:2px solid #00f2fe;
box-shadow:0 0 20px #00f2fe;
background:rgba(0,0,0,0.4);
}

.login-buttons{
display:flex;
gap:15px;
margin-top:10px;
}

#loginPage button{
padding:12px 25px;
border-radius:30px;
border:none;
font-weight:bold;
cursor:pointer;
background:linear-gradient(45deg,#00f2fe,#00ff88);
color:black;
transition:0.3s;
}

#loginPage button:hover{
transform:scale(1.1);
box-shadow:0 0 25px #00f2fe;
}

@keyframes glowText{
from{ text-shadow:0 0 10px #00f2fe; }
to{ text-shadow:0 0 30px #00ffea; }
}

@keyframes loginFade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}










/* ========================= */
/* NEON FLOATING PARTICLES */
/* ========================= */

.particles{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
overflow:hidden;
z-index:0;
pointer-events:none;
}

..particles span{
position:absolute;
display:block;
width:4px; /* thoda small */
height:4px;
background:#00f2fe;
border-radius:50%;
bottom:-20px;
animation:floatUp linear infinite;
box-shadow:0 0 5px #00f2fe,
            0 0 10px #00f2fe;
opacity:0.6; /* softer look */
}

@keyframes floatUp{
0%{
transform:translateY(0) scale(1);
opacity:0;
}
10%{
opacity:1;
}
100%{
transform:translateY(-110vh) scale(0.5);
opacity:0;
}
}




</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


</head>

<body>
<div class="glass">
    
    
    <div class="particles"></div>

<!-- LOGIN -->
<div id="loginPage">
<h2>🔐 Teacher Register / Login</h2>
<input type="email" id="teacherEmail" placeholder="Email">
<input type="password" id="teacherPass" placeholder="Password">
<div class="login-buttons">
<button id="registerBtn">Register</button>
<button id="loginBtn">Login</button>
</div>
<div id="errorMsg" style="color:#ff4b5c"></div>
</div>

<!-- APP -->
<div id="app">

<div class="header">
📘 Neon Attendance Pro
<span id="welcome"></span>
<button onclick="showAttendance()">Attendance</button>
<button onclick="showHistory()">History</button>
<button onclick="logout()">Logout</button>
</div>

<!-- ATTENDANCE PAGE -->
<div id="attendancePage" class="page active">

<div class="controls">
<select id="classSelect"></select>
<input type="date" id="dateSelect">
<input type="text" id="studentName" placeholder="Student Name">
<button onclick="addStudent()">Add</button>
<button onclick="loadAttendance()">Load</button>   <!-- NEW -->
<button onclick="downloadCSV()">Download CSV</button>


<button onclick="clearTodayAttendance()">Clear Today</button>

</div>

<div id="classTeacher" style="text-align:center"></div>
<div id="studentList"></div>
<div class="stats" id="stats"></div>


<div class="credit">
© 2026 | Designed & Developed By <span>Zakariya Mukadam</span>
</div>


</div>

<!-- HISTORY PAGE -->


<div id="historyPage" class="page">

<div class="controls">
<select id="historyMonth"></select>
<button onclick="loadHistory()">Load</button>
<button onclick="clearHistory()" style="background:#ff4b5c;color:white">
Clear History
</button>
</div>

<div id="historyList"></div>

<canvas id="analyticsChart" style="max-height:250px;"></canvas>



<div id="undoBox" style="
display:none;
background:#ff4b5c;
padding:10px;
margin:10px;
text-align:center;
border-radius:10px;
">
History will be deleted in 10 seconds...
<button onclick="undoDelete()" style="margin-left:10px;background:white;color:black">
UNDO
</button>
</div>





<button onclick="downloadMonthlyCSV()">Download Monthly CSV</button>


<div class="credit">
© 2026 | Designed & Developed By <span>Zakariya Mukadam</span>
</div>


</div>


<script type="module">
    
  let unsubscribe = null;  
  
 
  
  
    
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc,
updateDoc, deleteDoc, query, where, onSnapshot, orderBy }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";






// =============================
// SAFE PARTICLE GENERATOR
// =============================

window.addEventListener("DOMContentLoaded", () => {

const container = document.querySelector(".particles");

if(!container) return; // safety check

for(let i=0;i<50;i++){

let particle = document.createElement("span");

particle.style.left = Math.random()*100 + "%";
particle.style.animationDuration = (8 + Math.random()*12) + "s";
particle.style.opacity = Math.random();

container.appendChild(particle);

}

});








const firebaseConfig = {
apiKey: "AIzaSyD-ALQAWk3vDfEX5MoeJ5yMFskuyA1wBiA",
authDomain: "neon-attendance-system.firebaseapp.com",
projectId: "neon-attendance-system",
storageBucket: "neon-attendance-system.firebasestorage.app",
messagingSenderId: "1007195721127",
appId: "1:1007195721127:web:449457ade62226c5b9ba82"
};

const appFirebase = initializeApp(firebaseConfig);
const auth = getAuth(appFirebase);
const db = getFirestore(appFirebase);

let currentTeacher=null;



let pendingDeletes = [];
let deleteTimer = null;

const classes=[
"11th Arts","11th Commerce","11th Science",
"12th Arts","12th Commerce","12th Science"
];

classes.forEach(c=>{
classSelect.innerHTML+=`<option>${c}</option>`;
});

dateSelect.value=new Date().toISOString().split("T")[0];

registerBtn.onclick=async()=>{
try{
await createUserWithEmailAndPassword(auth,teacherEmail.value,teacherPass.value);
}catch(e){errorMsg.innerText=e.message;}
};

loginBtn.onclick=async()=>{
try{
await signInWithEmailAndPassword(auth,teacherEmail.value,teacherPass.value);
}catch(e){errorMsg.innerText=e.message;}
};

window.logout=()=>signOut(auth);

onAuthStateChanged(auth,(user)=>{
if(user){
currentTeacher=user.email;
loginPage.style.display="none";
app.style.display="flex";
welcome.innerText=" | "+currentTeacher;
renderStudents();
}else{
loginPage.style.display="flex";
app.style.display="none";
}
});

window.showAttendance=()=>{
attendancePage.classList.add("active");
historyPage.classList.remove("active");
};

window.showHistory=()=>{
attendancePage.classList.remove("active");
historyPage.classList.add("active");
populateMonths();
};



window.addStudent=async()=>{
if(!studentName.value)return;

await addDoc(collection(db,"attendance"),{
teacher:currentTeacher,
class:classSelect.value,
date:dateSelect.value,
name:studentName.value,
status:"Absent",
createdAt: Date.now()
});

studentName.value="";
renderStudents();
};







async function renderStudents(){

if(unsubscribe) unsubscribe();   // old listener remove

let q=query(
collection(db,"attendance"),
where("teacher","==",currentTeacher),
where("class","==",classSelect.value),
where("date","==",dateSelect.value),
orderBy("createdAt","asc")
);

unsubscribe = onSnapshot(q,(snap)=>{

studentList.innerHTML="";
let total=0,present=0;
let index=1;

snap.forEach(docSnap=>{
let s=docSnap.data();
total++;
if(s.status==="Present")present++;

studentList.innerHTML+=`
<div class="student">
<span>(${index}) ${s.name}</span>
<div>
<button class="${s.status==='Present'?'present':'absent'}"
onclick="toggleStatus('${docSnap.id}','${s.status}')">${s.status}</button>
<button onclick="editStudent('${docSnap.id}','${s.name}')">✏</button>
<button onclick="deleteStudent('${docSnap.id}')">🗑</button>
</div>
</div>`;

index++;
});

stats.innerText=`Total: ${total} | Present: ${present}`;

});
}

window.toggleStatus=async(id,status)=>{
let newStatus=status==="Present"?"Absent":"Present";
await updateDoc(doc(db,"attendance",id),{status:newStatus});
renderStudents();
};

window.editStudent=async(id,name)=>{
let newName=prompt("Edit Name:",name);
if(newName)
await updateDoc(doc(db,"attendance",id),{name:newName});
renderStudents();
};

window.deleteStudent=async(id)=>{
if(confirm("Delete student?")){
await deleteDoc(doc(db,"attendance",id));
renderStudents();
}
};

function populateMonths(){
let months=new Set();
getDocs(collection(db,"attendance")).then(snap=>{
snap.forEach(d=>{
if(d.data().teacher===currentTeacher){
months.add(d.data().date.substring(0,7));
}
});
historyMonth.innerHTML="";
months.forEach(m=>{
historyMonth.innerHTML+=`<option>${m}</option>`;
});
});
}




window.loadHistory=()=>{
let month=historyMonth.value;
historyList.innerHTML="";
getDocs(collection(db,"attendance")).then(snap=>{
snap.forEach(d=>{
let data=d.data();
if(data.teacher===currentTeacher && data.date.startsWith(month)){
historyList.innerHTML+=`
<div class="student">
<span>${data.date} - ${data.class} - ${data.name} - ${data.status}</span>
<button onclick="deleteHistory('${d.id}')">🗑</button>
</div>`;
}
});
});

generateAnalytics();   // ✅ Yaha

};





window.deleteHistory=async(id)=>{
if(confirm("Delete this record?")){
await deleteDoc(doc(db,"attendance",id));
loadHistory();
}
};


window.undoDelete = () => {
clearTimeout(deleteTimer);
pendingDeletes = [];
document.getElementById("undoBox").style.display="none";
alert("Delete Cancelled");
};





window.clearHistory = async () => {

let month = historyMonth.value;

if(!month){
alert("Please select month first");
return;
}

// Confirm first
if(!confirm("Are you sure you want to delete ALL history of this month?")){
return;
}

let snap = await getDocs(collection(db,"attendance"));

pendingDeletes = [];

snap.forEach(d=>{
let data = d.data();

if(data.teacher===currentTeacher && data.date.startsWith(month)){
pendingDeletes.push(d.id);
}
});

if(pendingDeletes.length===0){
alert("No records found");
return;
}

showUndoMessage();

deleteTimer = setTimeout(async ()=>{

let deletePromises = [];

pendingDeletes.forEach(id=>{
deletePromises.push(deleteDoc(doc(db,"attendance",id)));
});

await Promise.all(deletePromises);

pendingDeletes = [];
document.getElementById("undoBox").style.display="none";
loadHistory();

},10000);

};

let chartInstance = null;

window.generateAnalytics = async () => {

let month = historyMonth.value;
let presentCount = 0;
let totalCount = 0;

let q = query(
collection(db,"attendance"),
where("teacher","==",currentTeacher)
);

let snap = await getDocs(q);

snap.forEach(d=>{
let data = d.data();
if(data.date.startsWith(month)){
totalCount++;
if(data.status==="Present") presentCount++;
}
});

let absentCount = totalCount - presentCount;

let ctx = document.getElementById("analyticsChart").getContext("2d");

// Destroy old chart if exists
if(chartInstance){
chartInstance.destroy();
}

chartInstance = new Chart(ctx,{
type:'bar',
data:{
labels:['Present','Absent'],
datasets:[{
data:[presentCount, absentCount],
backgroundColor:[
'rgba(0,255,136,0.8)',
'rgba(255,75,92,0.8)'
],
borderColor:[
'#00ff88',
'#ff4b5c'
],
borderWidth:2
}]
},
options:{
responsive:true,
plugins:{
legend:{display:false}
},
scales:{
y:{
beginAtZero:true,
ticks:{color:'white'},
grid:{color:'rgba(255,255,255,0.1)'}
},
x:{
ticks:{color:'white'},
grid:{display:false}
}
},
animation:{
duration:1200,
easing:'easeOutQuart'
}
}
});

};


function showUndoMessage(){
let box = document.getElementById("undoBox");
box.style.display="block";
}



window.loadAttendance = () => {
renderStudents();
};



classSelect.addEventListener("change", renderStudents);
dateSelect.addEventListener("change", renderStudents);





window.clearTodayAttendance = async () => {
if(!confirm("Clear today attendance?")) return;

let q = query(
collection(db,"attendance"),
where("teacher","==",currentTeacher),
where("class","==",classSelect.value),
where("date","==",dateSelect.value)
);

let snap = await getDocs(q);

snap.forEach(async (d)=>{
await deleteDoc(doc(db,"attendance",d.id));
});

renderStudents();
};







function downloadCSV() {

    let rows = [];
    
    // Header row
    rows.push(["Roll No", "Name", "Status"]);

    // Student list se data lo
    document.querySelectorAll(".student").forEach(student => {

        let text = student.innerText.split("\n");

        let firstLine = text[0]; // (1) Name
        let status = text[1] || "";

        rows.push([firstLine, status]);
    });

    // Convert to CSV format
    let csvContent = rows.map(e => e.join(",")).join("\n");

    // Create download
    const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "attendance.csv";
    a.style.display = "none";

    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    URL.revokeObjectURL(url);
}












</script>
</body>
</html>
