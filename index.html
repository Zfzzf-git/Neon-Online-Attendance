<script type="module">
    
  let unsubscribe = null;  
  
 
  
  
    
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc,
updateDoc, deleteDoc, query, where, onSnapshot, orderBy }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";







// =============================
// SAFE PARTICLE GENERATOR
// =============================

window.addEventListener("DOMContentLoaded", () => {

const container = document.querySelector(".particles");

if(!container) return; // safety check

for(let i=0;i<50;i++){

let particle = document.createElement("span");

particle.style.left = Math.random()*100 + "%";
particle.style.animationDuration = (8 + Math.random()*12) + "s";
particle.style.opacity = Math.random();

container.appendChild(particle);

}

});








const firebaseConfig = {
apiKey: "AIzaSyD-ALQAWk3vDfEX5MoeJ5yMFskuyA1wBiA",
authDomain: "neon-attendance-system.firebaseapp.com",
projectId: "neon-attendance-system",
storageBucket: "neon-attendance-system.firebasestorage.app",
messagingSenderId: "1007195721127",
appId: "1:1007195721127:web:449457ade62226c5b9ba82"
};

const appFirebase = initializeApp(firebaseConfig);
const auth = getAuth(appFirebase);
const db = getFirestore(appFirebase);

let currentTeacher=null;



let pendingDeletes = [];
let deleteTimer = null;

const classes=[
"11th Arts","11th Commerce","11th Science",
"12th Arts","12th Commerce","12th Science"
];

classes.forEach(c=>{
classSelect.innerHTML+=`<option>${c}</option>`;
});

dateSelect.value=new Date().toISOString().split("T")[0];

registerBtn.onclick=async()=>{
try{
await createUserWithEmailAndPassword(auth,teacherEmail.value,teacherPass.value);
}catch(e){errorMsg.innerText=e.message;}
};

loginBtn.onclick=async()=>{
try{
await signInWithEmailAndPassword(auth,teacherEmail.value,teacherPass.value);
}catch(e){errorMsg.innerText=e.message;}
};

window.logout=()=>signOut(auth);

onAuthStateChanged(auth,(user)=>{
if(user){
currentTeacher=user.email;
loginPage.style.display="none";
app.style.display="flex";
welcome.innerText=" | "+currentTeacher;
renderStudents();
}else{
loginPage.style.display="flex";
app.style.display="none";
}
});

window.showAttendance=()=>{
attendancePage.classList.add("active");
historyPage.classList.remove("active");
};

window.showHistory = ()=>{
attendancePage.classList.remove("active");
historyPage.classList.add("active");
populateMonths();
};



window.addStudent=async()=>{
if(!studentName.value)return;

await addDoc(collection(db, "attendance_today"), {
  teacher: currentTeacher,
  class: classSelect.value,
  date: dateSelect.value,
  roll: studentRoll.value,
  name: studentName.value,
  status: "Present",
  createdAt: new Date()
});



studentName.value="";
renderStudents();
};







async function renderStudents(){

if(unsubscribe) unsubscribe();   // old listener remove

let q=query(
collection(db,"attendance_today"),



where("teacher","==",currentTeacher),
where("class","==",classSelect.value),
where("date","==",dateSelect.value),
orderBy("createdAt","asc")
);

unsubscribe = onSnapshot(q,(snap)=>{

studentList.innerHTML="";
let total=0,present=0;


snap.forEach(docSnap=>{
let s=docSnap.data();
total++;
if(s.status==="Present")present++;

studentList.innerHTML+=`
<div class="student ${s.status==='Present'?'presentRow':'absentRow'}"
onclick="openProfile('${s.name}','${s.roll}','${classSelect.value}')">
<span>(${s.roll}) ${s.name}</span>
<div>
<button class="${s.status==='Present'?'present':'absent'}"
onclick="toggleStatus('${docSnap.id}','${s.status}')">${s.status}</button>
<button onclick="editStudent('${docSnap.id}','${s.name}')">✏</button>
<button onclick="deleteStudent('${docSnap.id}')">🗑</button>
</div>
</div>`;


});

stats.innerText=`Total: ${total} | Present: ${present}`;

});
}

window.toggleStatus=async(id,status)=>{
let newStatus=status==="Present"?"Absent":"Present";
await updateDoc(doc(db,"attendance_today",id),{status:newStatus});
renderStudents();
};

window.editStudent=async(id,name)=>{
let newName=prompt("Edit Name:",name);
if(newName)
await updateDoc(doc(db,"attendance_today",id),{name:newName});
renderStudents();
};

window.deleteStudent=async(id)=>{
if(confirm("Delete student?")){
await deleteDoc(doc(db,"attendance_today",id));
renderStudents();
}
};

function populateMonths(){

let months = new Set();

getDocs(collection(db,"attendance_history")).then(snap=>{

snap.forEach(d=>{
if(d.data().teacher === currentTeacher){
months.add(d.data().date.substring(0,7));
}
});

historyMonth.innerHTML = "";

months.forEach(m=>{
historyMonth.innerHTML += `<option>${m}</option>`;
});

// AUTO LOAD HISTORY
if(historyMonth.options.length > 0){
historyMonth.selectedIndex = 0;
loadHistory();
}

});

}


window.loadHistory=()=>{
let month=historyMonth.value;
historyList.innerHTML="";

getDocs(collection(db,"attendance_history")).then(snap=>{

snap.forEach(d=>{
let data=d.data();

if(data.teacher===currentTeacher && data.date.startsWith(month)){

let glowClass = data.status === "Present" ? "presentGlow" : "absentGlow";


if(data.status === "Present"){
glowClass = "presentGlow";
}else{
glowClass = "absentGlow";
}

historyList.innerHTML+=`
<div class="student ${glowClass}" onclick="handleStudentClick(event,'${data.name}','-','${data.class}')">

<span>${data.date} - ${data.class} - ${data.name} - ${data.status}</span>

<button class="deleteBtn" onclick="deleteHistory('${d.id}')">🗑</button>

</div>`;
}

});

generateAnalytics();   // ✅ Yaha hona chahiye

});

};








window.filterHistory = function(){

let input = document.getElementById("searchStudent").value.toLowerCase();

document.querySelectorAll("#historyList .student").forEach(row=>{

let nameText = row.querySelector("span").innerText.toLowerCase();

if(nameText.includes(input)){
row.style.display="flex";
}else{
row.style.display="none";
}

});

};





window.filterHistory = function(){

let input = document.getElementById("searchStudent").value.toLowerCase();

document.querySelectorAll("#historyList .student").forEach(row=>{

let text = row.innerText.toLowerCase();

if(text.includes(input)){
row.style.display="flex";
}else{
row.style.display="none";
}

});

};


// 👇 Yaha paste karo
const searchInput = document.getElementById("searchStudent");
const graphBox = document.getElementById("graphBox");

searchInput.addEventListener("focus", ()=>{
graphBox.style.display="none";
});

searchInput.addEventListener("blur", ()=>{
graphBox.style.display="block";
});
















window.deleteHistory = async(event,id)=>{
event.stopPropagation();

await deleteDoc(doc(db,"attendance_history",id));
};

window.undoDelete = () => {
clearTimeout(deleteTimer);
pendingDeletes = [];
document.getElementById("undoBox").style.display="none";
alert("Delete Cancelled");
};





window.clearHistory = async () => {

let month = historyMonth.value;

if(!month){
alert("Please select month first");
return;
}

// Confirm first
if(!confirm("Are you sure you want to delete ALL history of this month?")){
return;
}

window.saveTodayToHistory = async () => {

let q = query(
collection(db,"attendance_today"),
where("teacher","==",currentTeacher),
where("class","==",classSelect.value),
where("date","==",dateSelect.value)
);

let snap = await getDocs(q);

if(snap.empty){
alert("No attendance to save");
return;
}

for (const d of snap.docs){

let data = d.data();

// check if already saved
let checkQuery = query(
collection(db,"attendance_history"),
where("teacher","==",data.teacher),
where("class","==",data.class),
where("date","==",data.date),
where("name","==",data.name)
);

let checkSnap = await getDocs(checkQuery);

if(checkSnap.empty){

await addDoc(collection(db,"attendance_history"),{
teacher:data.teacher,
class:data.class,
date:data.date,
roll:data.roll,
name:data.name,
status:data.status,
createdAt:new Date()
});

}else{

// update existing record
checkSnap.forEach(async (docSnap)=>{
await updateDoc(doc(db,"attendance_history",docSnap.id),{
status:data.status
});
});

}
}

alert("Attendance saved to history ✅");

};










window.downloadCSV = function() {

    let rows = [];
    rows.push(["Roll No", "Name", "Status"]);

    document.querySelectorAll(".student").forEach(student => {

let name = student.querySelector("span")?.innerText || "";
let status = student.querySelector(".present, .absent")?.innerText || "";

rows.push([name, status]);

});

    let csvContent = rows.map(e => e.join(",")).join("\n");

    const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "attendance.csv";
    a.style.display = "none";

    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    URL.revokeObjectURL(url);
};






window.downloadMonthlyCSV = async function() {

    let month = historyMonth.value;

    if(!month){
        alert("Please select month first");
        return;
    }

    let rows = [];
    rows.push(["Date","Class","Name","Status"]);

   let q = query(
collection(db,"attendance_history"),
where("teacher","==",currentTeacher)
);
    let snap = await getDocs(q);

    snap.forEach(d=>{
        let data = d.data();

        if(data.date.startsWith(month)){
            rows.push([
                data.date,
                data.class,
                data.name,
                data.status
            ]);
        }
    });

    if(rows.length === 1){
        alert("No data found for this month");
        return;
    }

    let csvContent = rows.map(e => e.join(",")).join("\n");

    const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = `Attendance_${month}.csv`;
    a.style.display = "none";

    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    URL.revokeObjectURL(url);
};

document.getElementById("imageUpload").addEventListener("change", async function(e){

const files = e.target.files;

for(let file of files){

const { data: { text } } = await Tesseract.recognize(
file,
'eng',
{
logger: m => console.log(m)
}
);

processStudentText(text);

}

});










function processStudentText(text){

const lines = text.split("\n");

let students = [];
let current = "";

lines.forEach(line=>{

line = line.trim();

if(/^\d+\)/.test(line)){

if(current){
students.push(current);
}

current = line.replace(/^\d+\)/,"").trim();

}else{

current += " " + line;

}

});

if(current){
students.push(current);
}

students.forEach(async name=>{

name = name.replace(/[^A-Za-z\s]/g,"").trim();

if(name.length < 3) return;

await addDoc(collection(db,"attendance_today"),{
teacher: currentTeacher,
class: classSelect.value,
date: dateSelect.value,
roll:"",
name:name,
status:"Absent",
createdAt:new Date()
});

});

renderStudents();

}
